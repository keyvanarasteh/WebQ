name: webq 
base: core22 
version: '0.3.3'
summary: A high-performance web intelligence and cybersecurity platform.
description: |
  WebQ is a cross-platform Web Intelligence and Cybersecurity platform 
  built with Rust, Svelte 5, and Tauri, powered by the web-analyzer crate.

grade: stable
confinement: strict

# Explicitly target multiple architectures for the build
architectures:
  - build-on: amd64
  - build-on: arm64

apps:
  webq:
    command: usr/bin/webq
    extensions: [gnome] 
    plugs:
      - network
      - network-bind
      - home

parts:
  webq-gui:
    plugin: rust
    source: .
    override-build: |
      # Install Bun for the frontend build
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install
      
      # Build Tauri application
      cargo install tauri-cli --version "^2.0.0"
      cargo tauri build
      
      # Copy final executable
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp src-tauri/target/release/webq-app $CRAFT_PART_INSTALL/usr/bin/webq
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - curl
      - wget
      - file
      - libxdo-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - nmap
      - dnsutils
      - openssl
