name: webq 
base: core22 
version: '0.4.1'
summary: A high-performance web intelligence and cybersecurity platform.
description: |
  WebQ is a cross-platform Web Intelligence and Cybersecurity platform 
  built with Rust, Svelte 5, and Tauri, powered by the web-analyzer crate.

grade: stable
confinement: strict

# Explicitly target multiple architectures for the build
architectures:
  - build-on: [amd64]
    build-for: [amd64]
  - build-on: [amd64]
    build-for: [arm64]

apps:
  webq:
    command: usr/bin/webq
    extensions: [gnome] 
    plugs:
      - network
      - network-bind
      - home

parts:
  webq-gui:
    plugin: rust
    source: .
    override-build: |
      # Install Node.js for the frontend build. Bun cannot import inlang's
      # generated data-URL modules reliably inside the Snapcraft build image.
      if ! command -v node >/dev/null || ! node -e "process.exit(Number(process.versions.node.split('.')[0]) >= 22 ? 0 : 1)"; then
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
        apt-get install -y nodejs
      fi

      npm ci
      
      # Build the Tauri binary only; Snapcraft creates the Snap package.
      cargo install tauri-cli --version "^2.0.0"
      cargo tauri build --no-bundle
      
      # Copy final executable
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp src-tauri/target/release/webq-app $CRAFT_PART_INSTALL/usr/bin/webq
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - curl
      - wget
      - file
      - unzip
      - libxdo-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - nmap
      - dnsutils
      - openssl
