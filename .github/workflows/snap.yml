name: Publish multi-arch Snap
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture: [amd64, arm64]

    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.architecture == 'arm64'
        uses: docker/setup-qemu-action@v3
        
      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snapBuild
        with:
          build-info: true
          snapcraft-args: --target-arch=${{ matrix.architecture }}

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapBuild.outputs.snap }}
          release: edge

      - name: 📡 Telegram — Snap Build Success
        if: success()
        run: |
          TAG="${GITHUB_REF_NAME}"
          MSG="✅ <b>Snap Build Passed</b> (${{ matrix.architecture }})%0A%0A📦 Tag: <code>${TAG}</code>%0A🏪 Published to Snap Store (edge)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.DEBUGGER_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.DEBUGGER_ADMIN_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML"

      - name: 📡 Telegram — Snap Build Failed
        if: failure()
        run: |
          TAG="${GITHUB_REF_NAME}"
          MSG="❌ <b>Snap Build FAILED</b> (${{ matrix.architecture }})%0A%0A📦 Tag: <code>${TAG}</code>%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.DEBUGGER_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.DEBUGGER_ADMIN_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
