name: Publish multi-arch Snap
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture: [amd64, arm64]

    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.architecture == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snapBuild
        with:
          build-info: true
          snapcraft-args: pack --build-for=${{ matrix.architecture }}

      - name: Validate Snap Store credentials
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -z "${SNAPCRAFT_STORE_CREDENTIALS}" ]; then
            echo "::error::SNAPCRAFT_STORE_CREDENTIALS is not set. Generate Snap Store credentials and add them as a repository Actions secret before publishing Snap releases."
            exit 1
          fi

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapBuild.outputs.snap }}
          release: edge

      - name: 📡 Telegram — Snap Build Success
        if: success()
        run: |
          TAG="${GITHUB_REF_NAME}"
          MSG="✅ <b>Snap Build Passed</b> (${{ matrix.architecture }})%0A%0A📦 Tag: <code>${TAG}</code>%0A🏪 Published to Snap Store (edge)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_QLINETECH }}/sendMessage" \
            -d chat_id="${{ secrets.QLINE_ID }}" \
            -d message_thread_id="${{ secrets.QLINE_TOPIC_WEBQ_DEBUGGER_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML"

      - name: 📡 Telegram — Snap Build Failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          
          # Get failed step names
          FAILED_STEPS=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .steps[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "")
          
          # Get last lines from failed logs
          ERROR_LOG=$(gh run view ${{ github.run_id }} --log-failed 2>/dev/null | grep -v "^$" | tail -5 | head -c 300 | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' || echo "")
          
          MSG="❌ <b>Snap Build FAILED</b> (${{ matrix.architecture }})%0A%0A📦 Tag: <code>${TAG}</code>"
          if [ -n "$FAILED_STEPS" ]; then
            MSG="${MSG}%0A💥 Step: <code>${FAILED_STEPS}</code>"
          fi
          if [ -n "$ERROR_LOG" ]; then
            MSG="${MSG}%0A%0A<pre>${ERROR_LOG}</pre>"
          fi
          MSG="${MSG}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Full Logs</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_QLINETECH }}/sendMessage" \
            -d chat_id="${{ secrets.QLINE_ID }}" \
            -d message_thread_id="${{ secrets.QLINE_TOPIC_WEBQ_DEBUGGER_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
