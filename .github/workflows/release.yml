name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Notify build started
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Telegram — Build Started
        run: |
          TAG="${GITHUB_REF_NAME}"
          MSG="🔨 <b>WebQ Release Build Started</b>%0A%0A📦 Tag: <code>${TAG}</code>%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Workflow</a>%0A%0A⏳ Building for: Linux, Windows, macOS (x86 + ARM)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_QLINETECH }}/sendMessage" \
            -d chat_id="${{ secrets.QLINE_ID }}" \
            -d message_thread_id="${{ secrets.QLINE_TOPIC_WEBQ_DEBUGGER_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

  release:
    needs: notify-start
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            label: '🍎 macOS (Apple Silicon)'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            label: '🍎 macOS (Intel)'
          - platform: 'ubuntu-22.04'
            args: ''
            label: '🐧 Linux (x86_64)'
          - platform: 'windows-latest'
            args: ''
            label: '🪟 Windows (x86_64)'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate -20)
          else
            COMMITS=$(git log --oneline --no-decorate "$PREV_TAG"..HEAD)
          fi

          # Build the release body
          cat > release_body.md << 'HEADER'
          ## 🔐 WebQ — Web Intelligence & Security Platform

          Cross-platform security analysis and intelligence gathering utility powered by Tauri v2, Svelte 5, and the web-analyzer Rust crate.

          ### 📦 Platform Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | 🐧 Linux | x86_64 | `.deb`, `.rpm`, `.AppImage` |
          | 🪟 Windows | x86_64 | `.exe` (NSIS), `.msi` |
          | 🍎 macOS | Apple Silicon (M1+) | `.dmg` |
          | 🍎 macOS | Intel (x86_64) | `.dmg` |

          ### 🔧 Installation

          - **Linux**: Download `.AppImage` (universal) or `.deb`/`.rpm` for your distro
          - **Windows**: Download `.exe` installer or `.msi` package
          - **macOS**: Download the `.dmg` for your architecture (Apple Silicon or Intel)

          > ✅ macOS builds are signed and notarized with an Apple Developer certificate.

          HEADER

          echo "### 📋 Changelog" >> release_body.md
          echo "" >> release_body.md
          echo "$COMMITS" | while IFS= read -r line; do
            echo "- $line" >> release_body.md
          done

          # Set multiline output
          {
            echo "body<<RELEASE_EOF"
            cat release_body.md
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Derive Apple signing identity
        id: apple-signing-identity
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE}" ]; then
            echo "::error::APPLE_CERTIFICATE is not set."
            exit 1
          fi

          if [ -z "${APPLE_CERTIFICATE_PASSWORD}" ]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD is not set."
            exit 1
          fi

          KEYCHAIN="$RUNNER_TEMP/webq-signing-check.keychain-db"
          CERT_PATH="$RUNNER_TEMP/webq-signing-check.p12"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          base64 --decode <<< "${APPLE_CERTIFICATE}" > "${CERT_PATH}" 2>/dev/null || base64 -D <<< "${APPLE_CERTIFICATE}" > "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security import "${CERT_PATH}" -k "${KEYCHAIN}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security

          IDENTITY="$(security find-identity -v -p codesigning "${KEYCHAIN}" | sed -n 's/.*"\(.*\)".*/\1/p' | head -n 1)"
          if [ -z "${IDENTITY}" ]; then
            echo "::error::No code signing identity found in APPLE_CERTIFICATE."
            exit 1
          fi

          echo "Using Apple signing identity: ${IDENTITY}"
          echo "identity=${IDENTITY}" >> "$GITHUB_OUTPUT"

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple Code Signing & Notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple-signing-identity.outputs.identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'WebQ v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: 📡 Telegram — Platform Build Success
        if: success()
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          MSG="✅ <b>${{ matrix.label }} Build Passed</b>%0A%0A📦 Tag: <code>${TAG}</code>%0A⏱️ Job: <code>${{ matrix.platform }}</code>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_QLINETECH }}/sendMessage" \
            -d chat_id="${{ secrets.QLINE_ID }}" \
            -d message_thread_id="${{ secrets.QLINE_TOPIC_WEBQ_DEBUGGER_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML"

      - name: 📡 Telegram — Platform Build Failed
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          
          # Get failed step names from this job
          FAILED_STEPS=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq '[.jobs[] | select(.status == "completed" and .conclusion == "failure") | .steps[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "")
          
          # Get last lines from failed logs  
          ERROR_LOG=$(gh run view ${{ github.run_id }} --log-failed 2>/dev/null | grep -v "^$" | tail -5 | head -c 300 | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' || echo "")
          
          # Build message
          MSG="❌ <b>${{ matrix.label }} Build FAILED</b>%0A%0A📦 Tag: <code>${TAG}</code>"
          if [ -n "$FAILED_STEPS" ]; then
            MSG="${MSG}%0A💥 Step: <code>${FAILED_STEPS}</code>"
          fi
          if [ -n "$ERROR_LOG" ]; then
            MSG="${MSG}%0A%0A<pre>${ERROR_LOG}</pre>"
          fi
          MSG="${MSG}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Full Logs</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_QLINETECH }}/sendMessage" \
            -d chat_id="${{ secrets.QLINE_ID }}" \
            -d message_thread_id="${{ secrets.QLINE_TOPIC_WEBQ_DEBUGGER_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

  # Final summary after all builds complete
  notify-done:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📡 Telegram — Release Summary
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          STATUS="${{ needs.release.result }}"
          if [ "$STATUS" = "success" ]; then
            ICON="🎉"
            LABEL="All Builds Passed"
          else
            ICON="⚠️"
            LABEL="Some Builds Failed"
          fi
          MSG="${ICON} <b>WebQ ${TAG} — ${LABEL}</b>%0A%0A📦 <a href='https://github.com/${{ github.repository }}/releases/tag/${TAG}'>View Release</a>%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Workflow Run</a>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_QLINETECH }}/sendMessage" \
            -d chat_id="${{ secrets.QLINE_ID }}" \
            -d message_thread_id="${{ secrets.QLINE_TOPIC_WEBQ_RELEASES_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
