const cols=["name","platforms","license","junk","dupes","viz","reg","start","uninst","privacy","shred","malware","cli","notes"];
let filterMode="all", sortCol=-1, sortDir=1;

function setFilter(f,el){
  filterMode=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function sortBy(i){
  if(sortCol===i) sortDir*=-1; else {sortCol=i;sortDir=1;}
  document.querySelectorAll('[id^=sa]').forEach(s=>s.textContent='');
  document.getElementById('sa'+i).textContent=sortDir===1?'▲':'▼';
  render();
}

function platHtml(a){
  let p=[];
  if(a.linux) p.push('<span class="plat">Linux</span>');
  if(a.win) p.push('<span class="plat">Win</span>');
  if(a.mac) p.push('<span class="plat">Mac</span>');
  return p.join(' ');
}

function priceHtml(a){
  let badge='';
  if(a.free && a.license.includes('Freemium')) badge='<span class="badge b-fp">Freemium</span>';
  else if(a.free) badge='<span class="badge b-free">Free</span>';
  else if(a.license.includes('Subscription')) badge='<span class="badge b-sub">Subscription</span>';
  else badge='<span class="badge b-paid">Paid</span>';
  return badge+'<br><span class="price">'+a.price+'</span>';
}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let data=apps.filter(a=>{
    const fm=filterMode;
    if(fm==='linux' && !a.linux) return false;
    if(fm==='win' && !a.win) return false;
    if(fm==='mac' && !a.mac) return false;
    if(fm==='free' && !a.free) return false;
    if(fm==='cross' && !a.cross) return false;
    if(q){
      const hay=(a.name+' '+a.tagline+' '+a.notes+' '+a.license+' '+a.price).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(sortCol>=0){
    data=[...data].sort((a,b)=>{
      let va,vb;
      if(sortCol===0){va=a.name;vb=b.name;}
      else if(sortCol===1){va=a.linux*4+a.win*2+a.mac;vb=b.linux*4+b.win*2+b.mac;}
      else if(sortCol===2){va=a.price;vb=b.price;}
      else {
        const fmap=[null,null,null,'junk','dupes','viz','reg','start','uninst','privacy','shred','malware','cli'];
        const k=fmap[sortCol];
        va=k?a[k]:0;vb=k?b[k]:0;
      }
      if(typeof va==='string') return sortDir*va.localeCompare(vb);
      return sortDir*(va-vb);
    });
  }

  document.getElementById('count').textContent='Showing '+data.length+' of 30 apps';
  const tb=document.getElementById('tbody');
  tb.innerHTML=data.map(a=>`<tr>
    <td><div class="name">${a.name}</div><div class="tagline">${a.tagline}</div></td>
    <td>${platHtml(a)}</td>
    <td>${priceHtml(a)}</td>
    <td>${a.junk?T:F}</td>
    <td>${a.dupes?T:F}</td>
    <td>${a.viz?T:F}</td>
    <td>${a.reg?T:F}</td>
    <td>${a.start?T:F}</td>
    <td>${a.uninst?T:F}</td>
    <td>${a.privacy?T:F}</td>
    <td>${a.shred?T:F}</td>
    <td>${a.malware?T:F}</td>
    <td>${a.cli?T:F}</td>
    <td><span style="font-size:11px;color:var(--color-text-secondary)">${a.notes}</span></td>
  </tr>`).join('');
}
